<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointments - Healthcare MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="d-flex" style="margin-top: 56px;">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="main-content flex-grow-1 p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-primary mb-0"><i class="bi bi-calendar-check me-2"></i>Appointments</h2>
                <a href="/appointments/book" class="btn btn-primary rounded-3">
                    <i class="bi bi-calendar-plus me-1"></i>Book Appointment
                </a>
            </div>

            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-3">
                <i class="bi bi-check-circle me-2"></i><span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-0">
                    <div th:if="${#lists.isEmpty(appointments)}" class="text-center py-5 text-muted">
                        <i class="bi bi-calendar-x fs-1 d-block mb-2"></i>
                        <p>No appointments found</p>
                        <a href="/appointments/book" class="btn btn-primary btn-sm">Book First Appointment</a>
                    </div>
                    <div th:unless="${#lists.isEmpty(appointments)}" class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Patient</th>
                                    <th>Doctor</th>
                                    <th>Date</th>
                                    <th>Time</th>
                                    <th>Reason</th>
                                    <th>Status</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="apt : ${appointments}">
                                    <td th:text="${apt.id}"></td>
                                    <td class="fw-semibold" th:text="${apt.patient.name}"></td>
                                    <td th:text="${apt.doctor.name}"></td>
                                    <td th:text="${apt.appointmentDate}"></td>
                                    <td th:text="${apt.appointmentTime}"></td>
                                    <td th:text="${apt.reason}"></td>
                                    <td>
                                        <span class="badge rounded-pill"
                                              th:classappend="${apt.status.name() == 'SCHEDULED'} ? 'bg-primary' : (${apt.status.name() == 'COMPLETED'} ? 'bg-success' : (${apt.status.name() == 'CANCELLED'} ? 'bg-danger' : 'bg-secondary'))"
                                              th:text="${apt.status}"></span>
                                    </td>
                                    <td>
                                        <div class="btn-group btn-group-sm" th:if="${apt.status.name() == 'SCHEDULED'}">
                                            <a th:href="@{/appointments/complete/{id}(id=${apt.id})}" class="btn btn-outline-success" title="Complete">
                                                <i class="bi bi-check-lg"></i>
                                            </a>
                                            <a th:href="@{/appointments/cancel/{id}(id=${apt.id})}" class="btn btn-outline-danger" title="Cancel"
                                               onclick="return confirm('Cancel this appointment?')">
                                                <i class="bi bi-x-lg"></i>
                                            </a>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
