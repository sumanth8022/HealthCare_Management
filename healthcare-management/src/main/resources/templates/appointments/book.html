<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Healthcare MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="d-flex" style="margin-top: 56px;">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="main-content flex-grow-1 p-4">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-calendar-plus me-2"></i>Book Appointment</h2>
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/appointments/save}" th:object="${appointment}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Patient *</label>
                                <select class="form-select" th:field="*{patient.id}">
                                    <option value="">Select Patient</option>
                                    <option th:each="p : ${patients}" th:value="${p.id}" th:text="${p.name + ' (ID: ' + p.id + ')'}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Doctor *</label>
                                <select class="form-select" th:field="*{doctor.id}">
                                    <option value="">Select Doctor</option>
                                    <option th:each="d : ${doctors}" th:value="${d.id}" th:text="${d.name + ' - ' + d.specialization}"></option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Date *</label>
                                <input type="date" class="form-control" th:field="*{appointmentDate}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('appointmentDate')}" th:errors="*{appointmentDate}"></div>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Time *</label>
                                <input type="time" class="form-control" th:field="*{appointmentTime}">
                                <div class="text-danger small mt-1" th:if="${#fields.hasErrors('appointmentTime')}" th:errors="*{appointmentTime}"></div>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Reason</label>
                                <textarea class="form-control" th:field="*{reason}" rows="2" placeholder="Reason for visit"></textarea>
                            </div>
                            <div class="col-md-12">
                                <label class="form-label fw-semibold">Notes</label>
                                <textarea class="form-control" th:field="*{notes}" rows="2" placeholder="Additional notes"></textarea>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 rounded-3"><i class="bi bi-check-circle me-1"></i>Book Appointment</button>
                            <a href="/appointments" class="btn btn-outline-secondary rounded-3">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
