<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Doctor - Healthcare MS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="d-flex" style="margin-top: 56px;">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <div class="main-content flex-grow-1 p-4">
            <h2 class="fw-bold text-primary mb-4"><i class="bi bi-pencil-square me-2"></i>Edit Doctor</h2>
            <div class="card border-0 shadow-sm rounded-4">
                <div class="card-body p-4">
                    <form th:action="@{/doctors/update/{id}(id=${doctor.id})}" th:object="${doctor}" method="post" novalidate>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Full Name *</label>
                                <input type="text" class="form-control" th:field="*{name}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Specialization *</label>
                                <select class="form-select" th:field="*{specialization}">
                                    <option value="Cardiology">Cardiology</option>
                                    <option value="Dermatology">Dermatology</option>
                                    <option value="General Medicine">General Medicine</option>
                                    <option value="Neurology">Neurology</option>
                                    <option value="Orthopedics">Orthopedics</option>
                                    <option value="Pediatrics">Pediatrics</option>
                                    <option value="Surgery">Surgery</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Phone</label>
                                <input type="text" class="form-control" th:field="*{phone}">
                            </div>
                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Email</label>
                                <input type="email" class="form-control" th:field="*{email}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Qualification</label>
                                <input type="text" class="form-control" th:field="*{qualification}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Experience (years)</label>
                                <input type="number" class="form-control" th:field="*{experience}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Consultation Fee ($)</label>
                                <input type="number" step="0.01" class="form-control" th:field="*{consultationFee}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">Status</label>
                                <select class="form-select" th:field="*{status}">
                                    <option value="AVAILABLE">Available</option>
                                    <option value="ON_LEAVE">On Leave</option>
                                    <option value="UNAVAILABLE">Unavailable</option>
                                </select>
                            </div>
                        </div>
                        <div class="mt-4 d-flex gap-2">
                            <button type="submit" class="btn btn-primary px-4 rounded-3"><i class="bi bi-check-circle me-1"></i>Update Doctor</button>
                            <a href="/doctors" class="btn btn-outline-secondary rounded-3">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
